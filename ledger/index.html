<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtue Ledger | Mac Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding-right: 20px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1>VIRTUE LEDGER</h1>
            <button id="global-theme-toggle" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:inherit;">◐</button>
        </div>
        <a href="https://mac-wall.com/portfolio.html" class="back-btn">← BACK TO PORTFOLIO</a>
    </div>

    <div id="virtue-ledger-app">
        <!-- SVG Definitions -->
        <svg style="width:0; height:0; position:absolute;">
            <defs>
                <filter id="true-ink" x="-30%" y="-30%" width="160%" height="160%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="4" result="paperFibers" />
                    <feDisplacementMap in="SourceGraphic" in2="paperFibers" scale="12" xChannelSelector="R" yChannelSelector="G" result="rawBleed" />
                    <feGaussianBlur in="rawBleed" stdDeviation="1.5" result="soakedBleed" />
                    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="macroWobble" />
                    <feDisplacementMap in="SourceGraphic" in2="macroWobble" scale="4" xChannelSelector="R" yChannelSelector="G" result="liquidBody" />
                    <feMerge result="inkOnPaper">
                        <feMergeNode in="soakedBleed" />
                        <feMergeNode in="liquidBody" />
                    </feMerge>
                    <feDropShadow in="inkOnPaper" dx="0.5" dy="1.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.35" />
                </filter>
            </defs>
        </svg>

        <div class="vl-container">
            <div class="vl-controls top-controls">
                <button id="view-toggle" class="vl-btn">VIEW: ALL-TIME STACK</button>
                <button id="open-log-btn" class="vl-btn">DATA & SETTINGS</button>
                <button id="undo-btn" class="vl-btn" title="Undo Last Click">UNDO</button>
                <button id="import-btn" class="vl-btn">IMPORT BACKUP</button>
                <button id="download-btn" class="vl-btn">DOWNLOAD BACKUP</button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>

            <div class="calendar-nav" id="calendar-nav">
                <button id="prev-week" class="vl-btn">← PAST</button>
                <h2 id="week-display">CURRENT WEEK</h2>
                <button id="next-week" class="vl-btn">FUTURE →</button>
            </div>

            <div class="tool-palette" id="tool-palette">
                <span class="palette-label">PEN:</span>
                <button id="tool-success" class="tool-btn active">PRACTICED</button>
                <button id="tool-failure" class="tool-btn">SLIPPED</button>
                <button id="tool-eraser" class="tool-btn">ERASER</button>
            </div>
            
            <div id="grid-container" class="grid-container"></div>
            <div class="status-bar"><span id="save-status"></span></div>
        </div>

        <!-- Modals and internal elements omitted for brevity, keep yours intact -->
        <!-- ... [Keep all your existing modal HTML here] ... -->

    </div>

<script src="app.js"></script>

<!-- Global Theme Sync Script -->
<script>
    const globalToggle = document.getElementById('global-theme-toggle');
    
    function initGlobalTheme() {
        const savedTheme = localStorage.getItem('portfolio-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    
    globalToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('portfolio-theme', newTheme);
    });

    initGlobalTheme();
</script>
</body>
</html>
