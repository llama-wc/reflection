<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Porous Bleed</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: sans-serif;
        }

        .ledger-container {
            position: relative;
            /* Adjusted width/height to make a nice 7x10 grid ratio */
            width: 420px; 
            height: 600px;
            background-color: #f4f1ea;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7 Days */
            grid-template-rows: repeat(10, 1fr); /* 10 Virtues */
            gap: 1px;
            background-color: #e0ddd6;
            border: 1px solid #e0ddd6;
            box-sizing: border-box;
        }

        .grid-cell { background-color: #f4f1ea; }

        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #d1ccbe; }
        button.primary { background-color: #c9c1ac; }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer" id="grid-bg">
            </div>

        <canvas id="ink-canvas" width="420" height="600"></canvas>
    </div>

    <div class="button-group">
        <button id="randomize-btn">Randomize Stack</button>
        <button id="bleed-btn" class="primary">Let it bleed</button>
    </div>

    <script>
        // Populate the 70 grid cells for the background
        const gridBg = document.getElementById('grid-bg');
        for(let i=0; i<70; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            gridBg.appendChild(cell);
        }

        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let animationId;
        let frameCount = 0;
        const MAX_FRAMES = 1200; // Let it bloom longer

        // Lighter, highly transparent colors to prevent the "black hole" effect
        const COLOR_RED_INK = 'rgba(200, 40, 60, 0.03)';
        const COLOR_BLUE_INK = 'rgba(40, 80, 200, 0.03)';

        // Solid colors for the initial dot state
        const COLOR_RED_SOLID = 'rgba(200, 40, 60, 0.8)';
        const COLOR_BLUE_SOLID = 'rgba(40, 80, 200, 0.8)';

        let ledgerData = [];
        const COLS = 7;
        const ROWS = 10;
        const CELL_W = canvas.width / COLS;
        const CELL_H = canvas.height / ROWS;

        class InkParticle {
            constructor(startX, startY, color, weightMultiplier) {
                // Start exactly at the origin point
                this.originX = startX;
                this.originY = startY;
                this.x = startX;
                this.y = startY;
                this.color = color;
                
                // The size of the "pore" it bleeds through
                this.size = Math.random() * 2 + 1;
                
                // How fast this specific particle wanders
                this.wanderSpeed = Math.random() * 1.5 + 0.5;
                
                // An outward pressure to ensure it doesn't just stay in a tight circle
                this.outwardBias = (Math.random() * 0.5) * weightMultiplier;
            }

            update() {
                // 1. Pure Brownian Motion (Random Jitter)
                this.x += (Math.random() - 0.5) * this.wanderSpeed;
                this.y += (Math.random() - 0.5) * this.wanderSpeed;

                // 2. Gentle Radial Push (Soaking outward from center)
                const dx = this.x - this.originX;
                const dy = this.y - this.originY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 0) {
                    this.x += (dx / dist) * this.outwardBias;
                    this.y += (dy / dist) * this.outwardBias;
                }

                // Keep it on the canvas
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width) this.x = canvas.width;
                if (this.y < 0) this.y = 0;
                if (this.y > canvas.height) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); // fillRect is faster than arc for thousands of tiny pores
            }
        }

        function generateRandomData() {
            if (animationId) cancelAnimationFrame(animationId);
            
            ledgerData = [];
            const numStacks = Math.floor(Math.random() * 8) + 5; // 5 to 12 stacked points
            
            for(let i=0; i<numStacks; i++) {
                // Pick a random Day (0-6) and Virtue (0-9)
                const col = Math.floor(Math.random() * COLS);
                const row = Math.floor(Math.random() * ROWS);
                
                ledgerData.push({
                    type: Math.random() > 0.5 ? 'red' : 'blue',
                    col: col,
                    row: row,
                    // Volume represents historical frequency
                    volume: Math.floor(Math.random() * 1500) + 500 
                });
            }
            
            // Give one random dot massive dominance
            ledgerData[ledgerData.length - 1].volume = 8000;
            
            drawInitialState();
        }

        function drawInitialState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            
            ledgerData.forEach(dot => {
                // Calculate precise center of the grid cell
                const centerX = (dot.col * CELL_W) + (CELL_W / 2);
                const centerY = (dot.row * CELL_H) + (CELL_H / 2);

                ctx.fillStyle = dot.type === 'red' ? COLOR_RED_SOLID : COLOR_BLUE_SOLID;
                ctx.beginPath();
                // Draw the dot size slightly based on its volume
                const radius = Math.min((dot.volume / 1000) + 4, 12); 
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function triggerBleed() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            frameCount = 0;
            
            // source-over with low opacity prevents the crushed black look
            ctx.globalCompositeOperation = 'source-over';

            ledgerData.forEach(dot => {
                const centerX = (dot.col * CELL_W) + (CELL_W / 2);
                const centerY = (dot.row * CELL_H) + (CELL_H / 2);
                
                const inkColor = dot.type === 'red' ? COLOR_RED_INK : COLOR_BLUE_INK;
                const weightMultiplier = dot.volume > 4000 ? 1.5 : 0.8; 
                
                for (let i = 0; i < dot.volume; i++) {
                    particles.push(new InkParticle(centerX, centerY, inkColor, weightMultiplier));
                }
            });

            animate();
        }

        function animate() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            frameCount++;
            if (frameCount < MAX_FRAMES) {
                animationId = requestAnimationFrame(animate);
            }
        }

        document.getElementById('randomize-btn').addEventListener('click', generateRandomData);
        document.getElementById('bleed-btn').addEventListener('click', triggerBleed);

        generateRandomData();
    </script>
</body>
</html>
