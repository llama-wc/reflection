<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Infinite Particle Bleed</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: sans-serif;
        }

        .ledger-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #f4f1ea;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1px;
            background-color: #ddd;
            padding: 20px;
            box-sizing: border-box;
        }

        .grid-cell { background-color: #f4f1ea; }

        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #d1ccbe; }
        button.primary { background-color: #c9c1ac; }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>

        <canvas id="ink-canvas" width="400" height="500"></canvas>
    </div>

    <div class="button-group">
        <button id="randomize-btn">Randomize Data</button>
        <button id="bleed-btn" class="primary">Let it bleed</button>
    </div>

    <script>
        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let animationId;
        let frameCount = 0;
        const MAX_FRAMES = 1000; // Stops the animation after ~16 seconds to save CPU

        // Solid colors for the initial state
        const COLOR_RED_SOLID = 'rgba(180, 20, 40, 0.9)';
        const COLOR_BLUE_SOLID = 'rgba(20, 50, 160, 0.9)';
        
        // Transparent colors for the particle bleed
        const COLOR_RED_INK = 'rgba(180, 20, 40, 0.04)';
        const COLOR_BLUE_INK = 'rgba(20, 50, 160, 0.04)';

        let ledgerData = [];

        class InkParticle {
            constructor(x, y, color, speedPower) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                // Explode outward
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * speedPower + 0.5;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 1.5 + 0.5;
            }

            update() {
                // Noise vector to create organic paper fiber paths
                const noiseAngle = (Math.sin(this.x * 0.02) + Math.cos(this.y * 0.02)) * Math.PI * 2;
                this.vx += Math.cos(noiseAngle) * 0.15;
                this.vy += Math.sin(noiseAngle) * 0.15;

                // Random chaotic wander to keep them spreading
                this.vx += (Math.random() - 0.5) * 0.5;
                this.vy += (Math.random() - 0.5) * 0.5;

                // Cap the speed so they don't jump too far between frames
                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (currentSpeed > 2.5) {
                    this.vx = (this.vx / currentSpeed) * 2.5;
                    this.vy = (this.vy / currentSpeed) * 2.5;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Bounce off the edges to keep filling the canvas
                if (this.x < 0) { this.x = 0; this.vx *= -1; }
                if (this.x > canvas.width) { this.x = canvas.width; this.vx *= -1; }
                if (this.y < 0) { this.y = 0; this.vy *= -1; }
                if (this.y > canvas.height) { this.y = canvas.height; this.vy *= -1; }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateRandomData() {
            if (animationId) cancelAnimationFrame(animationId);
            
            ledgerData = [];
            const numDots = Math.floor(Math.random() * 3) + 3; // Generate 3 to 5 dots
            
            for(let i=0; i<numDots; i++) {
                ledgerData.push({
                    type: Math.random() > 0.5 ? 'red' : 'blue',
                    // Keep them slightly away from the absolute edge
                    x: Math.random() * (canvas.width - 80) + 40,
                    y: Math.random() * (canvas.height - 80) + 40,
                    weight: Math.random() * 600 + 400 // Base weights between 400 and 1000
                });
            }
            
            // Force the VERY LAST item in the array to be the massive dominant weight
            ledgerData[ledgerData.length - 1].weight = 6000;
            
            drawInitialState();
        }

        function drawInitialState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Use normal overlapping for the solid starting dots
            ctx.globalCompositeOperation = 'source-over';
            
            ledgerData.forEach(dot => {
                ctx.fillStyle = dot.type === 'red' ? COLOR_RED_SOLID : COLOR_BLUE_SOLID;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function triggerBleed() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            frameCount = 0;
            
            // Switch to multiply for that rich, dark ink blending
            ctx.globalCompositeOperation = 'multiply';

            ledgerData.forEach(dot => {
                const inkColor = dot.type === 'red' ? COLOR_RED_INK : COLOR_BLUE_INK;
                const speedPower = dot.weight > 3000 ? 4 : 1.5; 
                
                for (let i = 0; i < dot.weight; i++) {
                    particles.push(new InkParticle(dot.x, dot.y, inkColor, speedPower));
                }
            });

            animate();
        }

        function animate() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            frameCount++;
            if (frameCount < MAX_FRAMES) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // Event Listeners
        document.getElementById('randomize-btn').addEventListener('click', generateRandomData);
        document.getElementById('bleed-btn').addEventListener('click', triggerBleed);

        // Initialize with a random setup on load
        generateRandomData();
    </script>
</body>
</html>
