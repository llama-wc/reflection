<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Thick Fluid Bleed</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: sans-serif;
        }

        .ledger-container {
            position: relative;
            width: 420px; 
            height: 600px;
            background-color: #f4f1ea;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(10, 1fr); 
            gap: 1px;
            background-color: #e0ddd6;
            border: 1px solid #e0ddd6;
            box-sizing: border-box;
        }

        .grid-cell { background-color: #f4f1ea; }

        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #d1ccbe; }
        button.primary { background-color: #c9c1ac; }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer" id="grid-bg"></div>
        <canvas id="ink-canvas" width="420" height="600"></canvas>
    </div>

    <div class="button-group">
        <button id="randomize-btn">Randomize Historical Jitter</button>
        <button id="bleed-btn" class="primary">Let it bleed</button>
    </div>

    <script>
        const gridBg = document.getElementById('grid-bg');
        for(let i=0; i<70; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            gridBg.appendChild(cell);
        }

        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let animationId;
        let frameCount = 0;
        const MAX_FRAMES = 900; // Shorter run time prevents over-saturating to black

        // Brightened base colors + extreme transparency for rich 'multiply' blending
        const COLOR_RED_INK = 'rgba(230, 80, 100, 0.015)';
        const COLOR_BLUE_INK = 'rgba(80, 130, 240, 0.015)';

        const COLOR_RED_DOT = 'rgba(190, 40, 60, 0.4)';
        const COLOR_BLUE_DOT = 'rgba(40, 80, 200, 0.4)';

        let rawLedgerEvents = []; 
        let gridDataMap = []; 
        const COLS = 7;
        const ROWS = 10;
        const CELL_W = canvas.width / COLS;
        const CELL_H = canvas.height / ROWS;

        class InkParticle {
            constructor(startX, startY, color, weightMultiplier) {
                this.originX = startX;
                this.originY = startY;
                this.x = startX;
                this.y = startY;
                this.color = color;
                
                // Thicker lines (arcs) instead of tiny rects
                this.size = Math.random() * 2.5 + 1.0; 
                
                // Smooth momentum variables
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.8 + 0.3;
                
                this.outwardBias = (Math.random() * 0.15) * weightMultiplier;
            }

            update() {
                // 1. Momentum Steering: Gently drift the angle instead of instantly snapping
                this.angle += (Math.random() - 0.5) * 0.25;

                // Move forward smoothly along the new angle
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // 2. Radial soak outward from specific dot coordinate
                const dx = this.x - this.originX;
                const dy = this.y - this.originY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 1) {
                    this.x += (dx / dist) * this.outwardBias;
                    this.y += (dy / dist) * this.outwardBias;
                }

                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width) this.x = canvas.width;
                if (this.y < 0) this.y = 0;
                if (this.y > canvas.height) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function generateHistoricalStackData() {
            if (animationId) cancelAnimationFrame(animationId);
            
            rawLedgerEvents = [];
            gridDataMap = Array(COLS).fill().map(() => Array(ROWS).fill().map(() => ({redVolume: 0, blueVolume: 0})));
            
            const totalHistoricalEvents = Math.floor(Math.random() * 80) + 200; 
            
            for(let i=0; i<totalHistoricalEvents; i++) {
                const col = Math.floor(Math.random() * COLS);
                const row = Math.floor(Math.random() * ROWS);
                
                const centerX = (col * CELL_W) + (CELL_W / 2);
                const centerY = (row * CELL_H) + (CELL_H / 2);

                const maxJitterW = CELL_W * 0.25;
                const maxJitterH = CELL_H * 0.25;
                const finalX = centerX + (Math.random() - 0.5) * maxJitterW;
                const finalY = centerY + (Math.random() - 0.5) * maxJitterH;
                
                const baseVolume = 250; 
                let eventType = Math.random() > 0.65 ? 'red' : 'blue'; 
                
                let actualVolume = baseVolume;
                if(i === totalHistoricalEvents - 1) {
                    eventType = 'blue';
                    actualVolume = 20000; // Massive dominance
                }

                rawLedgerEvents.push({ type: eventType, x: finalX, y: finalY, col: col, row: row });

                if(eventType === 'red') {
                    gridDataMap[col][row].redVolume += actualVolume;
                } else {
                    gridDataMap[col][row].blueVolume += actualVolume;
                }
            }
            drawInitialState();
        }

        function drawInitialState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'multiply'; 
            
            rawLedgerEvents.forEach(event => {
                ctx.fillStyle = event.type === 'red' ? COLOR_RED_DOT : COLOR_BLUE_DOT;
                ctx.beginPath();
                const radius = Math.random() * 3 + 4; 
                ctx.arc(event.x, event.y, radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function triggerBleed() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            frameCount = 0;
            
            ctx.globalCompositeOperation = 'multiply';

            for(let col=0; col<COLS; col++) {
                for(let row=0; row<ROWS; row++) {
                    const volumes = gridDataMap[col][row];
                    
                    if((volumes.redVolume + volumes.blueVolume) > 0) {
                        const centerX = (col * CELL_W) + (CELL_W / 2);
                        const centerY = (row * CELL_H) + (CELL_H / 2);
                        
                        for (let i = 0; i < (volumes.redVolume * 0.35); i++) {
                            particles.push(new InkParticle(centerX, centerY, COLOR_RED_INK, 0.6));
                        }
                        
                        const weightBias = volumes.blueVolume > 8000 ? 1.4 : 0.8; 
                        for (let i = 0; i < (volumes.blueVolume * 0.35); i++) {
                            particles.push(new InkParticle(centerX, centerY, COLOR_BLUE_INK, weightBias));
                        }
                    }
                }
            }
            animate();
        }

        function animate() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            frameCount++;
            if (frameCount < MAX_FRAMES) {
                animationId = requestAnimationFrame(animate);
            }
        }

        document.getElementById('randomize-btn').addEventListener('click', generateHistoricalStackData);
        document.getElementById('bleed-btn').addEventListener('click', triggerBleed);

        generateHistoricalStackData();
    </script>
</body>
</html>
