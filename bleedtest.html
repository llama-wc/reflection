<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Historical Multi-Week Bleed</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: sans-serif;
        }

        .ledger-container {
            position: relative;
            /* Adjusted width/height to make a nice 7x10 grid ratio */
            width: 420px; 
            height: 600px;
            background-color: #f4f1ea;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7 Days */
            grid-template-rows: repeat(10, 1fr); /* 10 Virtues */
            gap: 1px;
            background-color: #e0ddd6;
            border: 1px solid #e0ddd6;
            box-sizing: border-box;
        }

        .grid-cell { background-color: #f4f1ea; }

        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #d1ccbe; }
        button.primary { background-color: #c9c1ac; }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer" id="grid-bg">
            </div>

        <canvas id="ink-canvas" width="420" height="600"></canvas>
    </div>

    <div class="button-group">
        <button id="randomize-btn">Randomize Historical Stack</button>
        <button id="bleed-btn" class="primary">Let it bleed</button>
    </div>

    <script>
        // Populate the 70 grid cells for the background
        const gridBg = document.getElementById('grid-bg');
        for(let i=0; i<70; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            gridBg.appendChild(cell);
        }

        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let animationId;
        let frameCount = 0;
        const MAX_FRAMES = 1500; // Let it bloom significantly

        // extremely high transparency (0.01) to allow heavy blending
        const COLOR_RED_INK = 'rgba(190, 40, 60, 0.01)';
        const COLOR_BLUE_INK = 'rgba(40, 80, 200, 0.01)';

        // Deep habit colors for initialization
        const COLOR_RED_HABIT = 'rgba(190, 40, 60, 0.9)';
        const COLOR_BLUE_HABIT = 'rgba(40, 80, 200, 0.9)';

        let gridDataMap = []; // Summarized historical matrix
        const COLS = 7;
        const ROWS = 10;
        const CELL_W = canvas.width / COLS;
        const CELL_H = canvas.height / ROWS;

        class InkParticle {
            constructor(startX, startY, color, weightMultiplier) {
                // Start exactly at the origin point (pore)
                this.originX = startX;
                this.originY = startY;
                this.x = startX;
                this.y = startY;
                this.color = color;
                
                // microscopic pores
                this.size = Math.random() * 1.5 + 0.5;
                
                // Slow soak
                this.wanderSpeed = Math.random() * 1.2 + 0.2;
                
                // High recency/volume points push out harder
                this.outwardBias = (Math.random() * 0.4) * weightMultiplier;
            }

            update() {
                // 1. Pure Brownian Motion (Random Jitter)
                this.x += (Math.random() - 0.5) * this.wanderSpeed;
                this.y += (Math.random() - 0.5) * this.wanderSpeed;

                // 2. Continuous outwards bias from original pore
                const dx = this.x - this.originX;
                const dy = this.y - this.originY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 1) {
                    this.x += (dx / dist) * this.outwardBias;
                    this.y += (dy / dist) * this.outwardBias;
                }

                // 3. Keep it on the canvas (The card)
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width) this.x = canvas.width;
                if (this.y < 0) this.y = 0;
                if (this.y > canvas.height) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = this.color;
                // fillRect is much faster than arc for 100,000+ tiny pores
                ctx.fillRect(this.x, this.y, this.size, this.size); 
            }
        }

        function generateHistoricalStackData() {
            if (animationId) cancelAnimationFrame(animationId);
            
            // Clear and re-initialize the grid matrix (7x10)
            gridDataMap = Array(COLS).fill().map(() => Array(ROWS).fill().map(() => ({redCount: 0, blueCount: 0})));
            
            // Simulate 8 weeks * ~3 daily inputs = ~170 inputs
            const totalHistoricalEvents = Math.floor(Math.random() * 50) + 170; 
            
            for(let i=0; i<totalHistoricalEvents; i++) {
                // Pick a random Day (0-6) and Virtue (0-9)
                const col = Math.floor(Math.random() * COLS);
                const row = Math.floor(Math.random() * ROWS);
                
                // Realistic ~35% Red failure rate
                if(Math.random() > 0.65) {
                    gridDataMap[col][row].redCount++;
                } else {
                    gridDataMap[col][row].blueCount++;
                }
            }
            
            // Randomly force one cell to have massive historical weight (the dominant recent habit)
            const dominantCol = Math.floor(Math.random() * COLS);
            const dominantRow = Math.floor(Math.random() * ROWS);
            gridDataMap[dominantCol][dominantRow].blueCount += 12000; // Massive push

            drawInitialState();
        }

        function drawInitialState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            
            // Iterate over every cell to draw the historical habit density
            for(let col=0; col<COLS; col++) {
                for(let row=0; row<ROWS; row++) {
                    const cellData = gridDataMap[col][row];
                    const totalVolume = cellData.redCount + cellData.blueCount;
                    
                    if(totalVolume > 0) {
                        const centerX = (col * CELL_W) + (CELL_W / 2);
                        const centerY = (row * CELL_H) + (CELL_H / 2);
                        
                        // Habit color logic: Who is winning in this cell historically?
                        // If Red exists at all, make it Red to highlight failures, weighted towards Blue dominance
                        if(cellData.redCount > 0 && cellData.blueCount < 5) {
                            ctx.fillStyle = COLOR_RED_HABIT;
                        } else {
                            ctx.fillStyle = COLOR_BLUE_HABIT;
                        }
                        
                        ctx.beginPath();
                        // Radius scales with total habit volume (3px to 12px)
                        const radius = Math.min((totalVolume / 30) + 3, 12); 
                        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function triggerBleed() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            frameCount = 0;
            
            // Sticking to source-over with very low alpha for natural purple blending
            ctx.globalCompositeOperation = 'source-over';

            // Convert historical density matrix into particles
            for(let col=0; col<COLS; col++) {
                for(let row=0; row<ROWS; row++) {
                    const cellData = gridDataMap[col][row];
                    
                    if((cellData.redCount + cellData.blueCount) > 0) {
                        const centerX = (col * CELL_W) + (CELL_W / 2);
                        const centerY = (row * CELL_H) + (CELL_H / 2);
                        
                        // Spawn Red particles based on redCount (multiplied for better visible ink)
                        for (let i = 0; i < (cellData.redCount * 4); i++) {
                            particles.push(new InkParticle(centerX, centerY, COLOR_RED_INK, 0.7));
                        }
                        
                        // Spawn Blue particles based on blueCount. 
                        // The dominant point will spawn 12,000+ here, pushing out hard.
                        const speedBias = cellData.blueCount > 5000 ? 2.0 : 1.0; 
                        for (let i = 0; i < (cellData.blueCount); i++) {
                            particles.push(new InkParticle(centerX, centerY, COLOR_BLUE_INK, speedBias));
                        }
                    }
                }
            }

            animate();
        }

        function animate() {
            // We do not clear the canvas. We allow thousands of micro-dots to stack.
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            frameCount++;
            if (frameCount < MAX_FRAMES) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // Event Listeners
        document.getElementById('randomize-btn').addEventListener('click', generateHistoricalStackData);
        document.getElementById('bleed-btn').addEventListener('click', triggerBleed);

        // Initialize with a heavy historical load
        generateHistoricalStackData();
    </script>
</body>
</html>
