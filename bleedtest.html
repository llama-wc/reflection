<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Particle Bleed</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .ledger-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #f4f1ea;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Important: We need bounds so ink doesn't bleed off the card */
            overflow: hidden; 
        }

        /* The dummy grid underneath */
        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1px;
            background-color: #ddd;
            padding: 20px;
            box-sizing: border-box;
        }

        .grid-cell { background-color: #f4f1ea; }

        /* The hidden canvas on top */
        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background-color: #d1ccbe; }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>

        <canvas id="ink-canvas" width="400" height="500"></canvas>
    </div>

    <button id="bleed-btn">Let it bleed</button>

    <script>
        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        
        // This makes overlapping translucent colors multiply into rich darks (red+blue=purple)
        ctx.globalCompositeOperation = 'multiply';

        let particles = [];
        let animationId;

        // Extremely low opacity. The color builds up organically as particles overlap.
        const COLOR_RED = 'rgba(180, 20, 40, 0.04)';
        const COLOR_BLUE = 'rgba(20, 50, 160, 0.04)';

        // Dummy Data: Weight now dictates how many thousands of particles are spawned
        const ledgerData = [
            { color: COLOR_RED,  x: 80,  y: 80,  weight: 800 },   // Older
            { color: COLOR_BLUE, x: 240, y: 140, weight: 1200 },  // Older
            { color: COLOR_BLUE, x: 160, y: 220, weight: 1500 },  // Mid
            { color: COLOR_BLUE, x: 280, y: 350, weight: 8000 }   // NEWEST: Massive dominance
        ];

        class InkParticle {
            constructor(x, y, color, speedPower) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                // Explode outward in a random 360 degree direction
                const angle = Math.random() * Math.PI * 2;
                
                // Newer dots get pushed out faster and further
                const speed = Math.random() * speedPower;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // How many frames this microscopic dot will keep moving
                this.life = Math.random() * 80 + 20; 
                this.size = Math.random() * 1.5 + 0.5;
            }

            update() {
                // 1. PAPER FIBER SIMULATION: Use pseudo-random math based on coordinates to 
                // push particles along invisible "grain" lines, creating dendrites.
                const noiseAngle = (Math.sin(this.x * 0.05) + Math.cos(this.y * 0.05)) * Math.PI * 2;
                this.vx += Math.cos(noiseAngle) * 0.08;
                this.vy += Math.sin(noiseAngle) * 0.08;

                // 2. CAPILLARY JITTER: Random chaotic movement to make edges fuzzy
                this.vx += (Math.random() - 0.5) * 0.5;
                this.vy += (Math.random() - 0.5) * 0.5;

                // 3. FRICTION: The ink slows down as it soaks into the paper
                this.vx *= 0.93;
                this.vy *= 0.93;

                // 4. MOVE: Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // 5. SOAK IN: Particle gets smaller as it runs out of fluid
                this.size *= 0.98;
                this.life--;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function triggerBleed() {
            // Clear any old particles if button is clicked twice
            particles = []; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Generate the particle swarms based on weight
            ledgerData.forEach(dot => {
                // Higher weight dots get a higher starting speed to push their boundaries further
                const speedPower = dot.weight > 3000 ? 5 : 2.5; 
                
                for (let i = 0; i < dot.weight; i++) {
                    particles.push(new InkParticle(dot.x, dot.y, dot.color, speedPower));
                }
            });

            if (!animationId) animate();
        }

        function animate() {
            // Note: We deliberately DO NOT clear the canvas here. 
            // The magic is letting the transparent dots draw over each other frame after frame.
            
            let aliveParticles = 0;

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (p.life > 0) {
                    p.update();
                    p.draw();
                    aliveParticles++;
                }
            }

            // Keep animating until the ink "dries" (all particles die)
            if (aliveParticles > 0) {
                animationId = requestAnimationFrame(animate);
            } else {
                animationId = null; // Animation finished
            }
        }

        document.getElementById('bleed-btn').addEventListener('click', triggerBleed);
    </script>
</body>
</html>
