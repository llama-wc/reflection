<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtue Ledger - Bleed Effect</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f0f0f0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .ledger-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #f4f1ea;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* The dummy grid underneath */
        .grid-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1px;
            background-color: #ddd;
            padding: 20px;
            box-sizing: border-box;
        }

        .grid-cell {
            background-color: #f4f1ea;
            border: 1px solid #e0ddd6;
        }

        /* The hidden canvas on top */
        #ink-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            image-rendering: pixelated; /* Keeps the organic fractal look crisp */
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #e6e2d8;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #d1ccbe;
        }
    </style>
</head>
<body>

    <div class="ledger-container">
        <div class="grid-layer">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>

        <canvas id="ink-canvas" width="200" height="250"></canvas>
    </div>

    <button id="bleed-btn">Let it bleed</button>

    <script>
        const canvas = document.getElementById('ink-canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        // Two grids to handle the cellular automaton calculation
        let currentGrid = new Float32Array(width * height * 2); // 2 channels: Red, Blue
        let nextGrid = new Float32Array(width * height * 2);

        // Dummy Data: Using recencyWeight to determine initial "volume" of ink
        const ledgerData = [
            { type: 'red',  x: 50,  y: 60,  weight: 200 },  // Old temperance
            { type: 'blue', x: 140, y: 90,  weight: 300 },  // Old courage
            { type: 'blue', x: 100, y: 150, weight: 400 },  // Mid resolution
            { type: 'blue', x: 160, y: 200, weight: 5000 }  // NEWEST: Massive weight to dominate
        ];

        function getIndex(x, y) {
            return (y * width + x) * 2;
        }

        function dropInk() {
            ledgerData.forEach(dot => {
                const idx = getIndex(dot.x, dot.y);
                if (dot.type === 'red') {
                    currentGrid[idx] += dot.weight; 
                } else {
                    currentGrid[idx + 1] += dot.weight;
                }
            });
        }

        function diffuse() {
            // Diffusion rate and slight randomness for capillary branching
            const dA = 0.8; 
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = getIndex(x, y);
                    
                    // Add micro-randomness to simulate paper fibers
                    const fiberVariance = Math.random() * 0.2 + 0.9; 
                    
                    for (let c = 0; c < 2; c++) { // Calculate for Red (0) and Blue (1)
                        const center = currentGrid[idx + c];
                        const left   = currentGrid[getIndex(x - 1, y) + c];
                        const right  = currentGrid[getIndex(x + 1, y) + c];
                        const up     = currentGrid[getIndex(x, y - 1) + c];
                        const down   = currentGrid[getIndex(x, y + 1) + c];
                        
                        // Standard discrete Laplacian operator for diffusion
                        const laplace = (left + right + up + down) - (4 * center);
                        
                        nextGrid[idx + c] = center + (dA * laplace * fiberVariance);
                        
                        // Prevent negative ink
                        if (nextGrid[idx + c] < 0) nextGrid[idx + c] = 0;
                    }
                }
            }
            
            // Swap buffers
            let temp = currentGrid;
            currentGrid = nextGrid;
            nextGrid = temp;
        }

        function draw() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const gridIdx = getIndex(x, y);
                    const imgIdx = (y * width + x) * 4;

                    const rVal = currentGrid[gridIdx];
                    const bVal = currentGrid[gridIdx + 1];

                    // Map ink volume to visible colors
                    // Deep red: #8B0000 | Deep blue: #00008B
                    
                    let r = 244; // Paper base color
                    let g = 241;
                    let b = 234;
                    let a = 0;   // Transparent until ink hits it

                    if (rVal > 0.1 || bVal > 0.1) {
                        a = 255; // Ink makes it opaque
                        
                        // Blend the colors based on which ink is dominant
                        if (rVal > bVal) {
                            r = Math.max(139 - (rVal * 2), 50); // Darkens as it pools
                            g = 0;
                            b = 0;
                        } else {
                            r = 0;
                            g = 0;
                            b = Math.max(139 - (bVal * 2), 50);
                        }
                    }

                    data[imgIdx] = r;
                    data[imgIdx + 1] = g;
                    data[imgIdx + 2] = b;
                    data[imgIdx + 3] = a;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        let animationId;
        function animate() {
            diffuse();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        document.getElementById('bleed-btn').addEventListener('click', () => {
            canvas.style.opacity = 1;
            dropInk();
            if (!animationId) animate();
        });
    </script>
</body>
</html>
