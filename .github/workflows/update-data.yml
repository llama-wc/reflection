name: Automated Parquet ETL Pipeline

# THIS FIXES THE YELLOW WARNING
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit files back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 

      - name: Install Data Engineering Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars pyarrow requests 

      - name: Execute Python Pipeline
        run: python build_parquet.py
        env:
          # Pulls your API key securely so it isn't public in your code
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }} 

      - name: Commit and Push Updated Parquet Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Automated pipeline: Updated Parquet database via TMDB"
          file_pattern: "*.parquet"
