name: Update Movie Review Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC daily
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any other libraries your fetching logic needs here
          pip install polars pyarrow requests 

      - name: Run Update Script
        run: python update_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/reviews.parquet
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update movie review data"
          git push
