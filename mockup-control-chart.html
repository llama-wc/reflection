<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Color Control Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #151515;
            --text-main: #ffffff;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .chart-panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .title-block h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .title-block p {
            color: #888;
            font-size: 14px;
            margin: 0;
        }

        .legend {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #aaa;
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* The Gradient Legend Box */
        .legend-gradient {
            width: 40px; height: 12px;
            border-radius: 2px;
            background: linear-gradient(to right, #FF2A2A, #FF9F00, #00E676);
        }

        .legend-dashed {
            width: 20px; height: 0px;
            border-top: 2px dashed #666;
        }

        .chart-container {
            width: 100%;
            height: 400px;
            position: relative;
        }

        /* D3 CSS Overrides */
        .domain { display: none; } 
        .tick line { stroke: #333; stroke-dasharray: 4, 4; } 
        .tick text { fill: #777; font-family: 'Inter', sans-serif; font-size: 12px; }
        
        .btn-regenerate {
            margin-top: 30px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-regenerate:hover { background: #333; border-color: #555; }

    </style>
</head>
<body>

    <div class="chart-panel">
        <div class="panel-header">
            <div class="title-block">
                <h2>Longitudinal Score Variance</h2>
                <p>Average rating mapped to score-color with 95% Confidence Intervals</p>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-gradient"></div> Score Scale (Low to High)</div>
                <div class="legend-item"><div class="legend-dashed"></div> Global Mean</div>
            </div>
        </div>
        
        <div id="d3-canvas" class="chart-container"></div>
    </div>

    <button class="btn-regenerate" onclick="drawChart()">Regenerate Simulated Data</button>

    <script>
        // --- 1. THE EXACT SAME COLOR SCALE ---
        const colorScale = d3.scaleLinear()
            .domain([0.5, 2.75, 5.0]) 
            .range(["#FF2A2A", "#FF9F00", "#00E676"]) 
            .interpolate(d3.interpolateRgb); 

        // --- 2. SIMULATE DATABASE DATA ---
        function generateData() {
            let data = [];
            let currentAvg = 3.5; // Start in the amber/green mix
            
            for (let year = 1990; year <= 2025; year++) {
                currentAvg += (Math.random() - 0.5) * 0.8; // Larger swings to show off the colors
                if (currentAvg > 5.0) currentAvg = 5.0;
                if (currentAvg < 0.5) currentAvg = 0.5;
                
                let varianceBase = (2025 - year) * 0.02 + 0.1; 
                let marginOfError = varianceBase + (Math.random() * 0.2);

                data.push({
                    year: year,
                    avg: currentAvg,
                    upper: Math.min(5.0, currentAvg + marginOfError),
                    lower: Math.max(0.5, currentAvg - marginOfError)
                });
            }
            return data;
        }

        // --- 3. D3 RENDER LOGIC ---
        function drawChart() {
            const data = generateData();
            const globalMean = d3.mean(data, d => d.avg);

            d3.select("#d3-canvas").selectAll("*").remove();

            const container = document.getElementById("d3-canvas");
            const width = container.clientWidth;
            const height = container.clientHeight;
            const margin = {top: 20, right: 20, bottom: 30, left: 40};
            
            const svg = d3.select("#d3-canvas").append("svg")
                .attr("viewBox", `0 0 ${width} ${height}`)
                .style("width", "100%")
                .style("height", "100%")
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear()
                .domain(d3.extent(data, d => d.year))
                .range([0, width - margin.left - margin.right]);

            const y = d3.scaleLinear()
                .domain([0.5, 5.0]) // Lock domain to 0.5 - 5.0 so gradient aligns perfectly
                .range([height - margin.top - margin.bottom, 0]);

            // --- INJECT VERTICAL GRADIENT ---
            // This gradient maps the physical pixels of the Y-axis to our colors
            const defs = svg.append("defs");
            const gradient = defs.append("linearGradient")
                .attr("id", "score-gradient")
                .attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", 0).attr("y1", y(5.0))  // Top of chart
                .attr("x2", 0).attr("y2", y(0.5)); // Bottom of chart

            gradient.append("stop").attr("offset", "0%").attr("stop-color", "#00E676"); // 5.0
            gradient.append("stop").attr("offset", "50%").attr("stop-color", "#FF9F00"); // 2.75
            gradient.append("stop").attr("offset", "100%").attr("stop-color", "#FF2A2A"); // 0.5

            // AXES
            svg.append("g")
                .attr("transform", `translate(0,${height - margin.top - margin.bottom})`)
                .call(d3.axisBottom(x).tickFormat(d3.format("d")).tickSize(-height).ticks(10))
                .call(g => g.select(".domain").remove());

            svg.append("g")
                .call(d3.axisLeft(y).tickSize(-width + margin.left + margin.right).ticks(5))
                .call(g => g.select(".domain").remove());

            // THE CONFIDENCE INTERVAL BAND (Uses Gradient!)
            const area = d3.area()
                .curve(d3.curveMonotoneX)
                .x(d => x(d.year))
                .y0(d => y(d.lower))
                .y1(d => y(d.upper));

            svg.append("path")
                .datum(data)
                .attr("fill", "url(#score-gradient)") // Paint with gradient
                .attr("opacity", 0.15) // Ghost effect
                .attr("d", area);

            // THE GLOBAL MEAN DASHED LINE
            svg.append("line")
                .attr("x1", 0)
                .attr("x2", width - margin.left - margin.right)
                .attr("y1", y(globalMean))
                .attr("y2", y(globalMean))
                .attr("stroke", "#666")
                .attr("stroke-width", 2)
                .attr("stroke-dasharray", "5,5");

            // THE ANNUAL AVERAGE LINE (Uses Gradient!)
            const line = d3.line()
                .curve(d3.curveMonotoneX)
                .x(d => x(d.year))
                .y(d => y(d.avg));

            svg.append("path")
                .datum(data)
                .attr("fill", "none")
                .attr("stroke", "url(#score-gradient)") // Paint with gradient
                .attr("stroke-width", 3)
                .attr("d", line);

            // DATA POINTS (Calculates exact color per dot!)
            svg.selectAll(".dot")
                .data(data)
                .join("circle")
                .attr("class", "dot")
                .attr("cx", d => x(d.year))
                .attr("cy", d => y(d.avg))
                .attr("r", 4
