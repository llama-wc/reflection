<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC WALL | ANALYST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* THEME VARIABLES */
        :root[data-theme="dark"] {
            --bg-color: #121212; 
            --text-color: #e0e0e0; 
            --accent-color: #FF2A2A; 
            --line-color: #333;
            --p-color: #aaa;
            --strong-color: #fff;
            --nav-hover-text: #000;
            --watermark-rgb: 255, 255, 255;
        }

        :root[data-theme="light"] {
            --bg-color: #f5f5f5; 
            --text-color: #121212; 
            --accent-color: #d32f2f; 
            --line-color: #cccccc;
            --p-color: #555555;
            --strong-color: #000000;
            --nav-hover-text: #ffffff;
            --watermark-rgb: 0, 0, 0;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* THEME TOGGLE BUTTON */
        #theme-toggle {
            position: absolute;
            top: 2rem;
            right: 3rem;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        #theme-toggle:hover {
            color: var(--accent-color);
        }

        .container {
            width: 85%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* BACKGROUND ELEMENT - The Giant "W" Watermark */
        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* TYPOGRAPHY */
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(4rem, 10vw, 12rem); 
            text-transform: uppercase;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -2px;
            border-left: 10px solid var(--accent-color);
            padding-left: 2rem;
            animation: slideIn 1s ease-out;
        }

        h2 {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            font-size: clamp(1rem, 2vw, 1.5rem);
            margin-top: 1rem;
            margin-left: 2.5rem; 
            color: var(--text-color);
        }

        /* THE "DATA" SECTION */
        .data-block {
            margin-top: 4rem;
            margin-left: 2.5rem;
            max-width: 600px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: var(--p-color);
        }

        strong {
            color: var(--strong-color);
            font-weight: 600;
        }

        /* NAVIGATION LINKS */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            margin-top: 3rem;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid var(--line-color);
            padding: 1.5rem;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        /* HOVER EFFECTS */
        .nav-item:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--nav-hover-text);
            transform: translateX(10px); 
        }

        .nav-item i {
            font-size: 1rem;
            color: var(--accent-color);
            transition: color 0.2s;
        }

        .nav-item:hover i {
            color: var(--nav-hover-text);
        }

        /* ANIMATION */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* MOBILE RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            body {
                height: auto;
                overflow-y: auto;
                padding-bottom: 50px;
                padding-top: 60px; 
                justify-content: flex-start;
            }

            #theme-toggle {
                top: 1rem;
                right: 1.5rem;
            }

            .nav-grid {
                grid-template-columns: 1fr; 
                gap: 15px;
            }

            .data-block {
                margin-left: 0; 
                padding-left: 2.5rem; 
                padding-right: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" aria-label="Toggle Theme">◐</button>

    <!-- Watermark updated to use RGB CSS variables for dynamic opacity -->
    <svg class="watermark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" preserveAspectRatio="none">
        <rect x="0" y="0" width="15" height="100" fill="rgba(var(--watermark-rgb), 0.02)" />
        <rect x="85" y="0" width="14" height="100" fill="rgba(var(--watermark-rgb), 0.015)" />
        <polygon points="15,0  50,100  85,0  65,0  50,50  35,0" fill="rgba(var(--watermark-rgb), 0.012)" />
        <rect x="101" y="0" width="14" height="100" fill="rgba(var(--watermark-rgb), 0.01)" />
        <rect x="185" y="0" width="15" height="100" fill="rgba(var(--watermark-rgb), 0.008)" />
        <polygon points="115,100  150,0  185,100  165,100  150,50  135,100" fill="rgba(var(--watermark-rgb), 0.006)" />
    </svg>

    <main class="container">
        <header>
            <h1>Mac<br>Wall</h1>
            <h2>Data Analyst</h2>
        </header>

        <section class="data-block">
            <p>
                I am a Data Analyst specializing in <strong>automation and sharp insight</strong>.<br>
                I help close the loop between raw data and action.
            </p> 
            <div class="nav-grid">
                <a href="portfolio.html" class="nav-item">
                    Portfolio
                    <i class="fa-solid fa-arrow-right"></i>
                </a>

                <a href="mailto:mac.j.wall@gmail.com" class="nav-item">
                    Email
                    <i class="fa-solid fa-arrow-right"></i>
                </a>

                <a href="https://www.linkedin.com/in/mac-wall-a22b9a206" class="nav-item" target="_blank">
                    LinkedIn
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </section>
    </main>

    <!-- Theme Persistance Script -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        
        function initTheme() {
            // Uses the exact same key as the portfolio page
            const savedTheme = localStorage.getItem('portfolio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('portfolio-theme', newTheme);
        });

        initTheme();
    </script>
</body>
</html>
