<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elenchus | Socratic Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>SOCRATIC ENGINE</h1>
            <button id="theme-toggle" aria-label="Toggle Theme">◐</button>
        </div>
        <div class="status-bar">
            <span id="loading-status">Status: Online. Director Override Authorized.</span>
            <button id="reset-btn">Reset Engine</button>
        </div>
    </header>

    <main class="container">
        <section class="chat-section">
            <div id="chat-box">
                <div id="loading-indicator" style="display: none;">
                    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="State a premise or ask a question..." disabled>
                <button id="send-btn" disabled>SEND</button>
            </div>
        </section>

        <section class="logic-router">
            <h2>LOGIC ROUTER</h2>
            
            <div class="router-card">
                <div class="card-header">1. INITIAL PREMISE</div>
                <div id="track-initial" class="card-content monospace">Awaiting input...</div>
            </div>

            <div class="router-card">
                <div class="card-header">2. SYMBOLIC EXTRACTION</div>
                <div id="track-assumption" class="card-content monospace">Wait for premise...</div>
            </div>

            <div class="router-card">
                <div class="card-header">3. MACHINE DIRECTIVE</div>
                <div id="track-contradiction" class="card-content monospace">Wait for premise...</div>
            </div>

            <div class="router-card highlight-card">
                <div class="card-header">4. SYNTHESIZED VIEW</div>
                <div id="track-updated" class="card-content monospace">Awaiting resolution...</div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
