<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieLens Analytics Dashboard | Mac Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        :root[data-theme="dark"] {
            --bg-color: #0a0a0a;
            --panel-bg: #151515;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #ff4b4b;
            --border-color: #222;
        }
        :root[data-theme="light"] {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --text-main: #121212;
            --text-muted: #555555;
            --accent-color: #d32f2f;
            --border-color: #dddddd;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .header {
            padding: 20px 40px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 {
            font-family: 'Oswald', sans-serif; margin: 0; font-size: 24px;
            border-left: 4px solid var(--accent-color); padding-left: 10px;
        }
        .header-controls {
            display: flex; align-items: center; gap: 20px;
        }
        #theme-toggle {
            background: none; border: none; color: var(--text-main);
            font-size: 1.5rem; cursor: pointer; padding: 5px;
        }
        .back-btn {
            color: var(--text-muted); text-decoration: none;
            font-family: 'Inter', sans-serif; font-size: 14px;
            font-weight: 500; letter-spacing: 1px; transition: color 0.2s ease;
        }
        .back-btn:hover { color: var(--text-main); }

        /* Existing Filter Styles updated for variables */
        .filter-group {
            display: flex; gap: 15px; padding: 20px 40px;
            background: var(--panel-bg); border-bottom: 1px solid var(--border-color); flex-wrap: wrap;
            align-items: stretch;
        }
        .filter-group input {
            background: var(--bg-color); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 12px 15px; border-radius: 4px;
            font-family: 'Inter', sans-serif; font-size: 14px;
        }
        
        #resetBtn {
            background: var(--accent-color); color: white; border: none;
            padding: 0 25px; border-radius: 4px; cursor: pointer;
            font-family: 'Oswald', sans-serif; font-size: 16px;
        }

        /* Dashboard Panels updated for variables */
        #main-stage {
            display: grid; 
            grid-template-columns: 320px 340px 1fr;
            gap: 30px; padding: 40px;
        }
        .panel {
            background: var(--panel-bg); border-radius: 12px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid var(--border-color);
            display: flex; flex-direction: column; 
        }
        
        #ui-title { font-family: 'Oswald', sans-serif; font-size: 42px; text-transform: uppercase; margin: 0; line-height: 1.1; }
        #ui-tags { color: var(--accent-color); font-weight: 700; font-size: 14px; margin-bottom: 25px; }

        .hero-square {
            width: 100%; max-width: 300px; aspect-ratio: 1 / 1;
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background-color: var(--bg-color); box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            margin: auto; 
        }
        .score-text { font-family: 'Oswald', sans-serif; font-size: 8rem; margin: 0; color: var(--text-main); }
        .sub-text { color: var(--text-muted); font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }

        /* Tick colors for D3 charts in light mode */
        .tick text { fill: var(--text-muted); }
        .tick line { stroke: var(--border-color); }
    </style>
</head>
<body>

    <div class="header">
        <h1>MOVIE INTELLIGENCE DASHBOARD</h1>
        <div class="header-controls">
            <button id="theme-toggle">◐</button>
            <a href="portfolio.html" class="back-btn">← BACK TO PORTFOLIO</a>
        </div>
    </div>

    <div class="filter-group">
        <div class="search-wrapper" style="position: relative; flex: 1;">
            <input type="text" id="searchBar" placeholder="Search title..." disabled autocomplete="off" style="width:100%;">
            <div class="autocomplete-overlay" id="autocompleteOverlay"></div>
        </div>
        <input type="text" id="genreFilter" list="genreList" placeholder="All Genres" disabled>
        <input type="text" id="directorFilter" list="directorList" placeholder="All Directors" disabled>
        <button id="resetBtn">RESET</button>
    </div>

    <div id="main-stage">
        <div class="panel">
            <h2 id="ui-title">Loading...</h2>
            <div id="ui-tags">--</div>
            <div id="ui-desc">Initializing dataset...</div>
        </div>

        <div class="panel" style="align-items: center;">
            <h3 class="chart-title">Global Average</h3>
            <div class="hero-square" id="heroSquare">
                <h1 class="score-text" id="scoreDisplay">-</h1>
                <div class="sub-text" id="reviewCount">0 REVIEWS</div>
            </div>
        </div>

        <div class="panel trend-panel">
            <h3 class="chart-title">Longitudinal Variance</h3>
            <div id="trend-container" class="chart-container" style="flex:1;"></div>
        </div>
    </div>

    <script type="module" src="dashboard.js?v=1"></script>
    
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        function initTheme() {
            const savedTheme = localStorage.getItem('portfolio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('portfolio-theme', newTheme);
        });
        initTheme();
    </script>
</body>
</html>
