<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Metric Mockup - Pure Flat Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a; /* Darker background to make the square pop */
        }

        /* The Pure Flat Chart Object */
        .hero-square {
            width: 350px;
            height: 350px;
            border-radius: 12px; /* Sharper corners for a more analytical look */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            
            /* Initial Fallback Color */
            background-color: #FF2A2A; 
            
            /* Deep, dark shadow with zero white glare */
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            transition: background-color 0.1s ease;
        }

        /* The Massive Average Score */
        .score-text {
            font-family: 'Oswald', sans-serif;
            font-size: 12rem; /* Bumped up even larger */
            line-height: 1;
            margin: 0;
            color: #ffffff;
            /* Crisp, sharp drop shadow to separate text from background */
            text-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* The Supporting Subtext */
        .sub-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.95);
            z-index: 2;
            margin-top: -10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* Interactive Controls */
        .mockup-controls {
            margin-top: 60px;
            background: #151515;
            padding: 25px 40px;
            border-radius: 8px;
            border: 1px solid #222;
            text-align: center;
            width: 350px;
            box-sizing: border-box;
        }

        .mockup-controls h3 {
            margin-top: 0;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            color: #e0e0e0;
            text-transform: uppercase;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .mockup-label {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="hero-square" id="heroSquare">
        <h1 class="score-text" id="scoreDisplay">4.2</h1>
        <div class="sub-text" id="reviewCount">25M REVIEWS</div>
    </div>

    <div class="mockup-controls">
        <h3>Simulate Database Score</h3>
        <input type="range" id="scoreSlider" min="0.5" max="5.0" step="0.1" value="4.2">
        <div class="mockup-label">Pure hex codes. Zero glare. Maximum saturation.</div>
    </div>

    <script>
        const slider = document.getElementById('scoreSlider');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const heroSquare = document.getElementById('heroSquare');

        // 1. PURE, UNSHAPED HEX CODES
        const colorScale = d3.scaleLinear()
            .domain([0.5, 2.75, 5.0]) 
            .range(["#FF2A2A", "#FF9F00", "#00E676"]) 
            .interpolate(d3.interpolateRgb); 

        function updateHeroMetric(score) {
            scoreDisplay.innerText = parseFloat(score).toFixed(1);
            const vividColor = colorScale(score);
            heroSquare.style.backgroundColor = vividColor;
        }

        updateHeroMetric(slider.value);

        slider.addEventListener('input', (e) => {
            updateHeroMetric(e.target.value);
        });
    </script>
</body>
</html>
